@if(chartData && chartOptions){
  <div class="chart-container">

    <!-- Custom Header -->
    <div class="chart-header">
      <div class="cds--type-heading-compact-02">
        {{ chartTitle }}
      </div>

      @if(subHeading) {
        <div class="cds--type-body-compact-01 chart-subheading cds-mb-3">
          {{ subHeading }}
        </div>
      }
    </div>

    <!-- Chart -->
    <ibm-line-chart
      [data]="chartData"
      [options]="chartOptions">
    </ibm-line-chart>

  </div>
}
