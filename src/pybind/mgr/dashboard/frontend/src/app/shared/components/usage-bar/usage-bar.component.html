<div i18n>
    {{ isBinary ? (used | dimlessBinary) : (used | dimless) }} used ({{ isBinary ? (total | dimlessBinary) : (total | dimless) }} available)
</div>
<ibm-meter-chart *ngIf="used >=0 && total > 0; else noDataFound"
                 [data]="data"
                 [options]="options">
</ibm-meter-chart>
<ng-template #noDataFound>
  <span>-</span>
</ng-template>
