<div>
    {{ isBinary ? (used | dimlessBinary) : (used | dimless) }} / {{ isBinary ? (total | dimlessBinary) : (total | dimless) }}
</div>
<ibm-meter-chart *ngIf="used >=0 && total > 0; else noDataFound"
                 [data]="data"
                 [options]="options">
</ibm-meter-chart>
<ng-template #noDataFound>
  <span>-</span>
</ng-template>
