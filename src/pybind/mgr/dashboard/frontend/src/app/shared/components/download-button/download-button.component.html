<div ngbDropdown
     placement="bottom-right">
  <button type="button"
          [title]="title"
          class="btn btn-light dropdown-toggle-split"
          ngbDropdownToggle>
    <svg cdsIcon="download"
         size="16"
         class="cds--btn__icon"></svg>
  </button>
  <div ngbDropdownMenu>
    <button ngbDropdownItem
            (click)="download('json')"
            *ngIf="objectItem">
      <svg cdsIcon="code"
           size="16"
           class="cds--btn__icon"></svg>
      <span>JSON</span>
    </button>
    <button ngbDropdownItem
            (click)="download()"
            *ngIf="textItem">
      <svg cdsIcon="document"
           size="16"
           class="cds--btn__icon"></svg>
      <span>Text</span>
    </button>
  </div>
</div>
