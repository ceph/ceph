<div class="cds--toast-notification-container">
  <cds-toast
    *ngFor="let toast of activeToasts"
    [@toastAnimation]="'in'"
    [notificationObj]="{
      type: toast.type,
      title: toast.title,
      subtitle: toast.subtitle,
      caption: toast.caption,
      lowContrast: toast.lowContrast,
      showClose: toast.showClose
    }"
    (close)="onToastClose(toast)">
  </cds-toast>
</div>
