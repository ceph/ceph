<div class="notifications-panel" 
     (clickOutside)="closeSidebar()"
     [clickOutsideEnabled]="isSidebarOpened">
  <div class="notifications-header">
    <div class="notifications-title">Notifications</div>
    <div class="notifications-actions">
      <button class="dismiss-all-btn" 
              (click)="removeAll(); $event.stopPropagation()"
              *ngIf="notifications.length > 0 || executingTasks.length > 0">
        Dismiss all
      </button>
      <button class="close-btn" (click)="closeSidebar()">
        <i [ngClass]="[icons.close]"></i>
      </button>
    </div>
  </div>

  <div class="do-not-disturb">
    <label class="toggle-switch">
      <input type="checkbox" [(ngModel)]="doNotDisturb" (change)="toggleDoNotDisturb()">
      <span class="toggle-slider"></span>
    </label>
    <span class="dnd-text">Do not disturb</span>
  </div>

  <!-- Today Section -->
  <div class="notifications-section" *ngIf="todayNotifications.length > 0 || executingTasks.length > 0">
    <div class="section-header">Today</div>
    
    <!-- Executing Tasks -->
    <div *ngFor="let executingTask of executingTasks; trackBy:trackByFn" class="notification-item task-item">
      <div class="notification-icon running">
        <i [ngClass]="[icons.spinner, icons.spin]"></i>
      </div>
      <div class="notification-content">
        <div class="notification-time">Now</div>
        <div class="notification-title">{{ executingTask.description }}</div>
        <div class="notification-progress">
          <ngb-progressbar type="info" 
                          [value]="executingTask?.progress" 
                          [striped]="true" 
                          [animated]="true"></ngb-progressbar>
        </div>
      </div>
    </div>

    <!-- Today's Notifications -->
    <div *ngFor="let notification of todayNotifications; let i = index" class="notification-item">
      <div class="notification-icon" [ngClass]="getNotificationIconClass(notification)">
        <i [ngClass]="notification.iconClass"></i>
      </div>
      <div class="notification-content">
        <div class="notification-time">{{ getRelativeTime(notification) }}</div>
        <div class="notification-title">{{ notification.title }}</div>
        <div class="notification-message" [innerHtml]="notification.message"></div>
      </div>
    </div>
  </div>

  <!-- Previous Section -->
  <div class="notifications-section" *ngIf="previousNotifications.length > 0">
    <div class="section-header">Previous</div>
    
    <div *ngFor="let notification of previousNotifications; let i = index" class="notification-item">
      <div class="notification-icon" [ngClass]="getNotificationIconClass(notification)">
        <i [ngClass]="notification.iconClass"></i>
      </div>
      <div class="notification-content">
        <div class="notification-time">{{ getRelativeTime(notification) }}</div>
        <div class="notification-title">{{ notification.title }}</div>
        <div class="notification-message" [innerHtml]="notification.message"></div>
      </div>
    </div>
  </div>

  <!-- Empty State -->
  <div class="empty-state" *ngIf="notifications.length === 0 && executingTasks.length === 0">
    <div class="empty-state-message">
      <i [ngClass]="[icons.bell]"></i>
      <p>No notifications</p>
    </div>
  </div>
</div>
