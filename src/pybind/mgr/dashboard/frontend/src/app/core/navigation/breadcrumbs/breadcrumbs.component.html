<cds-breadcrumb
  [noTrailingSlash]="true"
  *ngIf="crumbs.length">
  <ng-container *ngFor="let crumb of crumbs; let last = last">
    <cds-breadcrumb-item *ngIf="!last && crumb.path !== null">
      <a
        (click)="navigateTo($event, crumb.path)"
        role="link"
        tabindex="0"
        class="cd-breadcrumb-link"
      >
        {{ crumb.text }}
      </a>
    </cds-breadcrumb-item>

    <cds-breadcrumb-item
      *ngIf="last || crumb.path === null"
      data-testid="active-breadcrumb-item">
      {{ crumb.text }}
    </cds-breadcrumb-item>
  </ng-container>
</cds-breadcrumb>
