<form [formGroup]="userForm"
      novalidate>
  <div cdsGrid
       [useCssGrid]="true"
       [narrow]="true"
       [fullWidth]="true">
    <div cdsCol
         [columnNumbers]="{sm: 4, md: 8}">
      <div cdsRow
           class="form-heading">
        <h3>{{ action | titlecase }} {{ resource | upperFirst }}</h3>
        <cd-help-text [formAllFieldsRequired]="true"></cd-help-text>
      </div>
      <div cdsRow
           class="form-item">
        <cds-password-label
          [invalid]="userForm.get('oldpassword') | hasError"
          [invalidText]="INVALID_TEXTS[userForm.get('oldpassword') | getError:['required', 'notmatch']]">
          Old Password
          <input cdsPassword
                 formControlName="oldpassword"
                 autocomplete="oldpassword"
                 [invalid]="userForm.get('oldpassword') | hasError"
                 id="oldpassword"
                 autofocus>
        </cds-password-label>
      </div>
      <div cdsRow
           class="form-item">
        <cds-password-label
          [invalid]="userForm.get('newpassword') | hasError"
          [invalidText]="INVALID_TEXTS[userForm.get('newpassword') | getError:['required', 'notmatch', 'passwordPolicy']]"
          [helperText]="passwordPolicyHelpText">
          New Password
          <input cdsPassword
                 formControlName="newpassword"
                 autocomplete="newpassword"
                 [invalid]="userForm.get('newpassword') | hasError"
                 id="newpassword">
        </cds-password-label>
      </div>
      <div cdsRow
           class="form-item">
        <cds-password-label
          [invalid]="userForm.get('confirmnewpassword') | hasError"
          [invalidText]="INVALID_TEXTS[userForm.get('confirmnewpassword') | getError:['required', 'match']]">
          Confirm New Password
          <input cdsPassword
                 formControlName="confirmnewpassword"
                 autocomplete="confirmnewpassword"
                 [invalid]="userForm.get('confirmnewpassword') | hasError"
                 id="confirmnewpassword">
        </cds-password-label>
      </div>
      <div cdsRow>
        <cd-form-button-panel (submitActionEvent)="onSubmit()"
                              [form]="userForm"
                              [submitText]="(action | titlecase) + ' ' + (resource | upperFirst)"
                              wrappingClass="text-right form-button"></cd-form-button-panel>
      </div>
    </div>
  </div>
</form>

<ng-template #customInvalidText>

<div class="cds--form-requirement">
   {{ invalidText }}
</div>
</ng-template>
