<div cdsGrid
     [narrow]="true"
     [fullWidth]="true"
     class="cds-mt-5 cds-mb-5">
  <div cdsRow [narrow]="true">
    <div cdsCol
         class="cds-mb-5"
         [columnNumbers]="{lg: 5}">
      <cds-tile>
        <div class="cds--type-heading-compact-02">Local filesystem</div>
        <div class="cds--type-body-02">{{ localFsName }}</div>
      </cds-tile>
    </div>
    <div cdsCol
         class="cds-mb-5"
         [columnNumbers]="{lg: 5}">
      <cds-tile>
        <div class="cds--type-heading-compact-02">Remote filesystem</div>
        <div class="cds--type-body-02">{{ remoteFsName }}</div>
      </cds-tile>
    </div>
    <div cdsCol
         class="cds-mb-5"
         [columnNumbers]="{lg: 6}">
      <cds-tile>
        <div class="cds--type-heading-compact-02">Remote cluster</div>
        <div class="cds--type-body-02">{{ remoteClusterName }}</div>
      </cds-tile>
    </div>
  </div>

  <div cdsRow [narrow]="true">
    <div cdsCol [columnNumbers]="{lg: 16}">
      <h3 class="cds--type-expressive-heading-03 cds-mb-3" i18n>Mirroring paths</h3>
      <cd-table
        [data]="(mirroringPaths$ | async) || []"
        [columns]="columns"
        [hasDetails]="false"
        [toolHeader]="false">
      </cd-table>
    </div>
  </div>
</div>
