<cds-tabs *ngIf="selection">
  <cds-tab heading="Quotas" i18n-heading>
    <div class="row">
      <div class="col-sm-6" *ngIf="selection.quota">
        <legend i18n>Account quota</legend>
        <cd-table-key-value [data]="quota">
        </cd-table-key-value>
      </div>
      <div class="col-sm-6" *ngIf="selection.bucket_quota">
        <legend i18n>Bucket quota</legend>
        <cd-table-key-value [data]="bucket_quota">
        </cd-table-key-value>
      </div>
    </div>
  </cds-tab>
  <cds-tab heading="Roles" i18n-heading>
    <cd-rgw-account-roles-list [accountId]="selection.id"></cd-rgw-account-roles-list>
  </cds-tab>
</cds-tabs>
