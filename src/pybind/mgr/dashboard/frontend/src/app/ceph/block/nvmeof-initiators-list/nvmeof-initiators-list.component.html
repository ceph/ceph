
<cd-alert-panel *ngIf="hasAllHostsAllowed()"
                type="info"
                [showTitle]="false">
  <div class="d-flex justify-content-between align-items-start">
    <div>
      <strong i18n>Host access: All hosts allowed</strong>
      <p class="cds-mb-0 cds-mt-1"
         i18n>Allowing all hosts grants access to every initiator on the network. Authentication is not supported in this mode, which may expose the subsystem to unauthorized access.</p>
    </div>
    <span class="text-nowrap cds-ml-3 text-muted"
          i18n>Edit host access</span>
  </div>
</cd-alert-panel>

<cd-table [data]="hasAllHostsAllowed() ? [] : initiators"
          columnMode="flex"
          (fetchData)="listInitiators()"
          [columns]="initiatorColumns"
          selectionType="multiClick"
          (updateSelection)="updateSelection($event)">
  <div class="table-actions">
    <cd-table-actions [permission]="permission"
                      [selection]="selection"
                      class="btn-group"
                      [tableActions]="tableActions">
    </cd-table-actions>
  </div>
</cd-table>
<ng-template #dhchapTpl
             let-value="data.value">
  <span>{{ value ? 'Yes' : 'No' }} <cd-icon type="warning"></cd-icon></span>
</ng-template>
