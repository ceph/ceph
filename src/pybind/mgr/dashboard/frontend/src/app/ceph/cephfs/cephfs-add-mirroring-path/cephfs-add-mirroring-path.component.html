<ng-template #descTpl
  >Filesystem: <strong>{{ fsName }}</strong></ng-template
>

<cd-tearsheet
  [steps]="steps"
  [title]="title"
  [modalHeaderLabel]="modalHeaderLabel"
  [descriptionTemplate]="descTpl"
  [isSubmitLoading]="isSubmitLoading"
  progressPosition="top"
  submitButtonLabel="Add mirror path"
  i18n-submitButtonLabel
  (submitRequested)="onSubmit()"
  (closeRequested)="onCancel()"
  (stepChanged)="onStepChanged($event)"
>
  <cd-tearsheet-step>
    <cd-mirroring-paths-step
      #pathsStep
      #tearsheetStep
      [fsName]="fsName"
      [fsId]="fsId"
    >
    </cd-mirroring-paths-step>
  </cd-tearsheet-step>
  <cd-tearsheet-step>
    <p
      class="cds--type-heading-03 cds-mb-3"
      i18n
    >
      Snapshot schedule
    </p>
    <p
      class="cds--type-body-compact-01 cds-mb-5"
      i18n
    >
      Define when snapshots are taken for the mirrored path(s).
    </p>
    <cd-cephfs-snapshotschedule-form
      #scheduleStep
      #tearsheetStep
      [embedded]="true"
      [hideDirectory]="true"
      [fsNameInput]="fsName"
      [fsIdInput]="fsId"
      [schedulePath]="schedulePath"
    >
    </cd-cephfs-snapshotschedule-form>
  </cd-tearsheet-step>
  <cd-tearsheet-step>
    <cd-mirroring-review-step
      #tearsheetStep
      [fsName]="fsName"
      [totalPaths]="reviewTotalPaths"
      [selectedPaths]="reviewSelectedPaths"
      [snapshotInterval]="reviewSnapshotInterval"
      [retention]="reviewRetention"
    >
    </cd-mirroring-review-step>
  </cd-tearsheet-step>
</cd-tearsheet>
