<ng-template #descTpl>Filesystem: <strong>{{fsName}}</strong></ng-template>

<cd-tearsheet
  [steps]="steps"
  [title]="title"
  [modalHeaderLabel]="modalHeaderLabel"
  [descriptionTemplate]="descTpl"
  [isSubmitLoading]="isSubmitLoading"
  progressPosition="top"
  submitButtonLabel="Add"
  i18n-submitButtonLabel
  (submitRequested)="onSubmit()"
  (stepChanged)="onStepChanged($event)"
  (closeRequested)="onCancel()">
  <cd-tearsheet-step>
    <cd-mirroring-paths-step
      #pathsStep
      #tearsheetStep
      [fsName]="fsName"
      [fsId]="fsId">
    </cd-mirroring-paths-step>
  </cd-tearsheet-step>
  <cd-tearsheet-step>
    <cd-mirroring-schedule-step
      #scheduleStep
      #tearsheetStep>
    </cd-mirroring-schedule-step>
  </cd-tearsheet-step>
  <cd-tearsheet-step>
    <cd-mirroring-review-step
      #reviewStep
      #tearsheetStep
      [destinationCluster]="reviewDestinationCluster"
      [destinationFilesystem]="reviewDestinationFs"
      [totalPaths]="reviewTotalPaths"
      [snapshotInterval]="reviewSnapshotInterval"
      [retention]="reviewRetention"
      [existingScheduleCount]="reviewExistingScheduleCount">
    </cd-mirroring-review-step>
  </cd-tearsheet-step>
</cd-tearsheet>
