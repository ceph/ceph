<ng-template #descTpl>Filesystem: <strong>{{fsName}}</strong></ng-template>

<cd-tearsheet
  [steps]="steps"
  [title]="title"
  [label]="label"
  [descriptionTemplate]="descTpl"
  [isSubmitLoading]="isSubmitLoading"
  progressPosition="top"
  submitButtonLabel="Add paths"
  i18n-submitButtonLabel
  (submitRequested)="onSubmit($event)"
  (closeRequested)="onClose()"
  (stepChanged)="onStepChanged($event)">
  <cd-tearsheet-step>
    <cd-mirroring-paths-step
      #pathsStep
      #tearsheetStep
      [fsName]="fsName"
      [fsId]="fsId"
      (pathsChanged)="onPathsChanged($event)">
    </cd-mirroring-paths-step>
  </cd-tearsheet-step>
  <cd-tearsheet-step>
    <cd-mirroring-schedule-step
      #scheduleStep
      #tearsheetStep
      [fsName]="fsName"
      [selectedPaths]="selectedPaths">
    </cd-mirroring-schedule-step>
  </cd-tearsheet-step>
</cd-tearsheet>
