<cds-modal size="md"
           [open]="open"
           [hasScrollingContent]="true"
           (overlaySelected)="closeModal()">
  <cds-modal-header (closeSelect)="closeModal()">
    <h3 cdsModalHeaderHeading
        i18n>{{ action | titlecase }} {{ resource | upperFirst }}</h3>
  </cds-modal-header>
  <ng-container *cdFormLoading="loading">
    <form name="domainSettingsForm"
          #formDir="ngForm"
          [formGroup]="domainSettingsForm"
          novalidate>
      <div cdsModalContent>
        <div class="form-item">
          <cds-text-label
            label="realm"
            for="realm"
            cdRequiredField="Realm Name"
            [invalid]="
              !domainSettingsForm.controls.realm.valid && domainSettingsForm.controls.realm.dirty
            "
            [invalidText]="realmNameError"
            i18n
            >Realm Name
            <input
              cdsText
              type="text"
              placeholder="Realm name..."
              id="realm"
              name="realm"
              formControlName="realm"
              autofocus
            />
          </cds-text-label>
          <ng-template #realmNameError>
            <span
              *ngIf="domainSettingsForm.showError('realm', formDir, 'required')"
              class="invalid-feedback"
            >
              <ng-container i18n> This field is required. </ng-container>
            </span>
          </ng-template>
        </div>

        <!-- Join Source -->
        <ng-container
          formArrayName="joinSources"
          *ngFor="let joinSource of joinSources.controls; index as i"
        >
          <ng-container [formGroupName]="i">
            <div cdsRow
                 class="form-item form-item-append">
              <div cdsCol
                   [columnNumbers]="{ lg: 14 }">
                <input
                  cdsText
                  type="text"
                  placeholder="Id.."
                  [id]="'ref' + i"
                  [name]="'ref' + i"
                  formControlName="ref"
                  modal-primary-focus
                  [invalid]="
                    !domainSettingsForm.controls['joinSources'].controls[i].valid &&
                    domainSettingsForm.controls['joinSources'].dirty
                  "
                  [invalidText]="refError"
                  i18n
                />
                <ng-template #refError>
                  <span
                    class="invalid-feedback"
                    *ngIf="domainSettingsForm.showError('joinSources', formDir, 'required')"
                    i18n
                    >This field is required.</span
                  >
                </ng-template>
              </div>
              <div cdsCol
                   *ngIf="i > 0"
                   [columnNumbers]="{ lg: 1 }">
                <cds-icon-button kind="danger"
                                 size="sm"
                                 (click)="removeJoinSource(i)">
                  <svg cdsIcon="trash-can"
                       size="32"
                       class="cds--btn__icon"></svg>
                </cds-icon-button>
              </div>
            </div>
          </ng-container>
        </ng-container>
        <div class="form-item">
          <button cdsButton="tertiary"
                  type="button"
                  (click)="addJoinSource()"
                  i18n>
            Add Join Source
            <svg cdsIcon="add"
                 size="32"
                 class="cds--btn__icon"
                 icon></svg>
          </button>
        </div>
      </div>
      <cd-form-button-panel
        (submitActionEvent)="submit()"
        [form]="domainSettingsForm"
        [submitText]="(action | titlecase) + ' ' + (resource | upperFirst)"
        [modalForm]="true"
      >
      </cd-form-button-panel>
    </form>
  </ng-container>
</cds-modal>
