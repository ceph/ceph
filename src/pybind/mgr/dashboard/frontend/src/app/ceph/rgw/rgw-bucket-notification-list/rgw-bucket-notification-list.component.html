  <legend i18n>
    Notification Configuration
    <cd-help-text>
      Create a notification configuration to trigger alerts for specific bucket events, such as object creation or transitions, based on prefixes or tags.
    </cd-help-text>
  </legend>
  <cd-table #table
            [data]="notification$ | async"
            [columns]="columns"
            columnMode="flex"
            selectionType="single"
            (updateSelection)="updateSelection($event)"
            identifier="Id"
            (fetchData)="loadNotification($event)">
  <cd-table-actions class="table-actions"
            [permission]="permission"
            [selection]="selection"
            [tableActions]="tableActions">
  </cd-table-actions>
  <cd-rgw-bucket-details *cdTableDetail
                  [selection]="expandedRow">
  </cd-rgw-bucket-details>       
  </cd-table>
  <ng-template #filterTpl
               let-config="data.value">
  <ng-container *ngFor="let key of ['S3Key', 'S3Metadata', 'S3Tags']">
  <legend class="cds--label">{{key}}:</legend>
  <span  *ngFor="let data of config[key].FilterRule">
  <cds-tag size="sm"
           [type]="'blue'"> {{ data.Name }}: {{ data.Value }}</cds-tag>

  </span>
  </ng-container>
  </ng-template>
