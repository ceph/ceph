<ng-container *ngIf="gatewayGroup$ | async as gateways">
  <cd-table
    #table
    [data]="gateways"
    [columns]="columns"
    columnMode="flex"
    selectionType="single"
    identifier="name"
    (updateSelection)="updateSelection($event)"
    (fetchData)="fetchData()">
  <cd-table-actions class="table-actions"
                    [permission]="permission"
                    [selection]="selection"
                    [tableActions]="tableActions">
  </cd-table-actions>
  </cd-table>
</ng-container>

<ng-template #dateTpl
             let-events="data.value">
  <span *ngIf="events?.length">{{ events[0].created | date:'EEE d MMM, yyyy' }}</span>
</ng-template>
<ng-template #gatewayTpl
             let-gateway="data.value">
  <div [cdsStack]="'horizontal'"
       [gap]="'4'">

    @if (gateway.running > 0) {
  <span>
    <svg
      [cdsIcon]="icons.success"
      [size]="iconSize.size16"
      class="cds-success-color"
      aria-label="Running"></svg>
    <span class="ml-3">{{ gateway.running }}</span>
  </span>
}

@if (gateway.error > 0) {
  <span class="ml-3">
    <svg
      [cdsIcon]="icons.danger"
      [size]="iconSize.size16"
      class="cds-danger-color"
      aria-label="Error"></svg>
    <span class="ml-3">{{ gateway.error }}</span>
  </span>
}


  </div>
</ng-template>
