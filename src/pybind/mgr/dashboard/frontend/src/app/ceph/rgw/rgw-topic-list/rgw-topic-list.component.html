  <cd-table #table
            [autoReload]="false"
            [data]="topics"
            [columns]="columns"
            columnMode="flex"
            selectionType="multiClick"
            [hasDetails]="true"
            (setExpandedRow)="setExpandedRow($event)"
            (updateSelection)="updateSelection($event)"
            identifier="name"
            (fetchData)="loadTopics($event)">
    <cd-rgw-topic-details *cdTableDetail
                          [selection]="expandedRow"></cd-rgw-topic-details>
  </cd-table>
