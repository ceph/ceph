<ng-container *ngIf="selection">
  <nav
    ngbNav
    #nav="ngbNav"
    class="nav-tabs"
    cdStatefulTab="rgw-daemon-details"
  >
    <ng-container ngbNavItem="details">
      <a
        ngbNavLink
        i18n
        >Details</a
      >
      <ng-template ngbNavContent>
        <cd-table-key-value
          [data]="metadata"
          (fetchData)="getMetaData()"
        >
        </cd-table-key-value>
      </ng-template>
    </ng-container>
    <ng-container ngbNavItem="performance-counters">
      <a
        ngbNavLink
        i18n
        >Performance Counters</a
      >
      <ng-template ngbNavContent>
        <cd-table-performance-counter
          serviceType="rgw"
          [serviceId]="serviceMapId"
        >
        </cd-table-performance-counter>
      </ng-template>
    </ng-container>
    <ng-container
      ngbNavItem="performance-details"
      *ngIf="grafanaPermission.read"
    >
      <a
        ngbNavLink
        i18n
        >Performance Details</a
      >
      <ng-template ngbNavContent>
        <div class="cds-mb-4">
          <cd-time-picker
            [dropdownSize]="'sm'"
            [label]="'Time Span'"
            (selectedTime)="getPrometheusData($event)"
          ></cd-time-picker>
        </div>
        <div
          cdsGrid
          [narrow]="true"
          [condensed]="false"
          [fullWidth]="true"
        >
          <div
            cdsRow
            [narrow]="true"
          >
            <div
              cdsCol
              class="cds-mb-5"
              [columnNumbers]="{ lg: 8, md: 8, sm: 12 }"
            >
              <cd-area-chart
                chartTitle="Requests/sec"
                i18n-chartTitle
                [dataUnit]="''"
                [rawData]="requestsChartData"
              >
              </cd-area-chart>
            </div>
            <div
              cdsCol
              class="cds-mb-5"
              [columnNumbers]="{ lg: 8, md: 8, sm: 12 }"
            >
              <cd-area-chart
                chartTitle="Latency"
                i18n-chartTitle
                [dataUnit]="'ms'"
                [decimals]="2"
                [rawData]="latencyChartData"
              >
              </cd-area-chart>
            </div>
            <div
              cdsCol
              class="cds-mb-5"
              [columnNumbers]="{ lg: 16, md: 8, sm: 12 }"
            >
              <cd-area-chart
                chartTitle="Bandwidth"
                i18n-chartTitle
                [dataUnit]="'B'"
                [rawData]="bandwidthChartData"
              >
              </cd-area-chart>
            </div>
          </div>
        </div>
      </ng-template>
    </ng-container>
  </nav>

  <div [ngbNavOutlet]="nav"></div>
</ng-container>
