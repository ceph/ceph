<cd-smb-tabs></cd-smb-tabs>
<ng-container *ngIf="joinAuth$ | async as joinAuth">
  <cd-table
    #table
    [data]="joinAuth"
    columnMode="flex"
    [columns]="columns"
    identifier="id"
    forceIdentifier="true"
    selectionType="single"
    [hasDetails]="false"
    (setExpandedRow)="setExpandedRow($event)"
    (fetchData)="loadJoinAuth($event)"
  >
    <div class="table-actions">
      <cd-table-actions [permission]="permission"
                        [selection]="selection"
                        class="btn-group"
                        id="join_auth-actions"
                        [tableActions]="tableActions">
      </cd-table-actions>
    </div>
  </cd-table>
</ng-container>
