<nav
  ngbNav
  #nav="ngbNav"
  class="nav-tabs"
>
  <ng-container ngbNavItem>
    <a
      ngbNavLink
      i18n
      >Gateways List</a
    >
    <ng-template ngbNavContent>
      <cd-table
        [data]="daemons"
        [columns]="columns"
        columnMode="flex"
        [hasDetails]="true"
        (setExpandedRow)="setExpandedRow($event)"
        (fetchData)="getDaemonList($event)"
      >
        <cd-rgw-daemon-details
          *cdTableDetail
          [selection]="expandedRow"
        >
        </cd-rgw-daemon-details>
      </cd-table>
    </ng-template>
  </ng-container>

  <ng-container
    ngbNavItem
    *ngIf="grafanaPermission.read && isMultiSite"
  >
    <a
      ngbNavLink
      i18n
      >Sync Performance</a
    >
    <ng-template ngbNavContent>
      <!-- Native Sync Performance can be implemented here if needed -->
    </ng-template>
  </ng-container>
</nav>

<div [ngbNavOutlet]="nav"></div>
