<cd-smb-tabs></cd-smb-tabs>
<ng-container *ngIf="usersGroups$ | async as usersGroups">
  <cd-table
    #table
    [data]="usersGroups"
    columnMode="flex"
    [columns]="columns"
    identifier="id"
    forceIdentifier="true"
    selectionType="single"
    [hasDetails]="false"
    (setExpandedRow)="setExpandedRow($event)"
    (fetchData)="loadUsersGroups($event)"
  >
  </cd-table>
  </ng-container>
