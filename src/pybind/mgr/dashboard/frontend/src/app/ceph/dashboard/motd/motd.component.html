<div *ngIf="motd"
     class="container-fluid">
  <cd-info-group groupTitle="Message of the day"
                 i18n-groupTitle>
    <cd-alert-panel [type]="{'info': 'info', 'warning': 'warning', 'danger': 'error'}[motd.severity]"
                    [showTitle]="false">
      <span [innerHTML]="motd.message | sanitizeHtml"></span>
    </cd-alert-panel>
  </cd-info-group>
</div>
