<cds-tabs
  type="contained"
  followFocus="true"
  isNavigation="true"
  [cacheActive]="false">
  <cds-tab
    heading="Overview"
    i18n-heading
    [tabIndex]="null"
    [active]="activeTab === Tabs.overview"
    (selected)="onSelected(Tabs.overview)">
  </cds-tab>
  <cds-tab
    heading="Targets"
    i18n-heading
    [tabIndex]="null"
    [active]="activeTab === Tabs.targets"
    (selected)="onSelected(Tabs.targets)">
  </cds-tab>
</cds-tabs>
