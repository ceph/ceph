<cds-tabs type="contained" followFocus="true" [cacheActive]="false">
  <cds-tab
    heading="Server-side Encryption"
    i18n-heading>
    <cd-table #table
              [data]="encryptionConfigValues"
              [columns]="columns"
              (fetchData)="fetchData()"
              identifier="unique_id"
              [forceIdentifier]="true"
              [hasDetails]="true"
              (updateSelection)="updateSelection($event)"
              (setExpandedRow)="setExpandedRow($event)"
              columnMode="flex"
              selectionType="single">
      <cd-table-actions class="table-actions"
                        [permission]="permissions.configOpt"
                        [selection]="selection"
                        [tableActions]="tableActions">
      </cd-table-actions>
      <cd-rgw-config-details *cdTableDetail
                             [selection]="expandedRow"
                             [excludeProps]="excludeProps">
      </cd-rgw-config-details>
    </cd-table>
  </cds-tab>
</cds-tabs>
