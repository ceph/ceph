@if (daemonStatus$ | async; as daemonStatus) {
  <cd-table
    #table
    [data]="daemonStatus"
    [columns]="columns"
    columnMode="flex"
    selectionType="single"
    (fetchData)="loadDaemonStatus()">
    <cd-table-actions class="table-actions"
                      [permission]="permission"
                      [selection]="selection"
                      [tableActions]="tableActions">
    </cd-table-actions>
  </cd-table>
}
