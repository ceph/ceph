<cds-tabs
  type="contained"
  followFocus="true"
  isNavigation="true"
  [cacheActive]="false">
  <cds-tab
    heading="Configuration"
    i18n-heading
    [tabIndex]="null"
    [active]="activeTab === Tabs.configuration"
    (selected)="onSelected(Tabs.configuration)">
  </cds-tab>
  <cds-tab
    heading="Sync Policy"
    i18n-heading
    [tabIndex]="null"
    [active]="activeTab === Tabs.syncPolicy"
    (selected)="onSelected(Tabs.syncPolicy)">
  </cds-tab>
</cds-tabs>
