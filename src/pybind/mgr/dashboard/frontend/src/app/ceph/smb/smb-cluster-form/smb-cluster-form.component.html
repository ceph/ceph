<div cdsCol
     [columnNumbers]="{ md: 4 }"
     *ngIf="orchStatus$ | async as orchStatus">
  <form name="smbForm"
        #formDir="ngForm"
        [formGroup]="smbForm"
        novalidate>
    <div i18n="form title"
         class="form-header">
      {{ action | titlecase }} {{ resource | upperFirst }}
    </div>

    <!-- Cluster Id -->
    <div class="form-item">
      <cds-text-label
        for="cluster_id"
        i18n
        helperText="Unique cluster identifier"
        i18n-helperText
        cdRequiredField="Cluster Name"
        [invalid]="smbForm.controls.cluster_id.invalid && smbForm.controls.cluster_id.dirty"
        [invalidText]="clusterError"
        >Cluster Name
        <input
          cdsText
          type="text"
          placeholder="Cluster ID..."
          i18n-placeholder
          id="cluster_id"
          name="cluster_id"
          formControlName="cluster_id"
          [invalid]="smbForm.controls.cluster_id.invalid && smbForm.controls.cluster_id.dirty"
        />
      </cds-text-label>
      <ng-template #clusterError>
        <span
          class="invalid-feedback"
          *ngIf="smbForm.showError('cluster_id', formDir, 'required')"
          i18n
          >This field is required.</span
        >
      </ng-template>
    </div>

    <!-- Auth Mode -->
    <div class="form-item">
      <cds-select
        formControlName="auth_mode"
        name="auth_mode"
        for="auth_mode"
        label="Auth Mode"
        cdRequiredField="Auth Mode"
        id="auth_mode"
        [invalid]="smbForm.controls.auth_mode.invalid && smbForm.controls.auth_mode.dirty"
        [invalidText]="authModeError"
        (change)="onAuthModeChange()"
        i18n
      >
        <option value="">-- Select the auth mode --</option>
        <option value="active-directory">Active Directory</option>
        <option value="user">User</option>
      </cds-select>

      <ng-template #authModeError>
        <span
          class="invalid-feedback"
          *ngIf="smbForm.showError('auth_mode', formDir, 'required')"
          i18n
          >This field is required.</span
        >
      </ng-template>
    </div>

    <!-- Domain Settings -->
    <div class="form-item"
         *ngIf="this.smbForm.get('auth_mode').value === 'active-directory'">
      <div cdsCol
           [columnNumbers]="{ md: 12 }"
           class="d-flex">
        <cds-text-label
          for="domain_settings"
          i18n
          cdRequiredField="Domain Settings"
          [invalid]="
            smbForm.controls.domain_settings.invalid && smbForm.controls.domain_settings.dirty
          "
          [invalidText]="domainError"
          >Domain Settings
          <div class="cds-input-group">
            <input
              cdsText
              type="text"
              placeholder="Domain Settings..."
              i18n-placeholder
              id="domain_settings"
              name="domain_settings"
              formControlName="domain_settings"
              [attr.disabled]="true"
              [invalid]="
                smbForm.controls.domain_settings.invalid && smbForm.controls.domain_settings.dirty
              "
            />
            <cds-icon-button kind="ghost"
            (click)="editDomainSettingsModal()"
                             size="md">
              <svg cdsIcon="edit"
                   size="32"
                   class="cds--btn__icon"
                   icon></svg>
            </cds-icon-button>

            <cds-icon-button kind="ghost"
            (click)="deleteDomainSettingsModal()"
                             size="md">
              <svg cdsIcon="trash-can"
                   size="32"
                   class="cds--btn__icon"
                   icon></svg>
            </cds-icon-button>
          </div>
        </cds-text-label>
      </div>
    </div>


     <!-- User Group Settings -->
    <ng-container formArrayName="joinSources"
    *ngFor="let dns of joinSources.controls; index as i">
<div cdsRow *ngIf="this.smbForm.get('auth_mode').value === 'user'"
class="form-item form-item-append">
<div cdsCol
[columnNumbers]="{ lg: 8 }">
<cds-text-label
for="user_group_setting"
i18n
cdRequiredField="User Group Setting"
[invalid]="
smbForm.controls['joinSources'].controls[i].invalid &&
smbForm.controls['joinSources'].dirty"
[invalidText]="refError"
>User Group Setting
   <input
                cdsText
                type="text"
                placeholder="User Group Setting"
              
                [formControlName]="i"
                modal-primary-focus
                [invalid]="
                smbForm.controls['joinSources'].controls[i].invalid &&
                smbForm.controls['joinSources'].dirty
              "
              [invalidText]="refError"
                i18n/>
                </cds-text-label>
   <ng-template #refError>
    <span
      class="invalid-feedback"
      *ngIf="smbForm.showError('joinSources', formDir, 'required')"
      i18n
      >This field is required.</span
    >
  </ng-template>
</div>
<div cdsCol
[columnNumbers]="{ lg: 1 }"
class="item-action-btn">
<cds-icon-button kind="tertiary" *ngIf="i > 0" 
             size="sm"
             (click)="removeUserGroupSetting(i)">
<svg cdsIcon="trash-can"
   size="32"
   class="cds--btn__icon"></svg>
</cds-icon-button>
</div>
</div>
</ng-container>

<div class="form-item"  *ngIf="this.smbForm.get('auth_mode').value === 'user'">
<button cdsButton="tertiary"
type="button"
(click)="addUserGroupSetting()"
i18n>
Add User Group Setting
<svg cdsIcon="add"
size="32"
class="cds--btn__icon"
icon></svg>
</button>
</div>



    <!-- Placement -->
    <ng-container *ngIf="orchStatus.available">
      <div class="form-item">
        <cds-select
          label="Placement"
          for="placement"
          formControlName="placement"
          name="placement"
          id="placement"
          i18n
        >
          <option value="hosts">Hosts</option>
          <option value="label">Labels</option>
        </cds-select>
      </div>
      <ng-container *ngIf="hostsAndLabels$ | async as data">
        <!-- Label -->
        <div *ngIf="smbForm.controls.placement.value === 'label'"
             class="form-item">
          <cds-combo-box
            type="multi"
            selectionFeedback="top-after-reopen"
            label="Label"
            for="label"
            name="label"
            formControlName="label"
            id="label"
            placeholder="Select labels..."
            [appendInline]="true"
            [items]="data.labels"
            i18n-placeholder
            (selected)="multiSelector($event, 'label')"
            [invalid]="smbForm.controls.label.invalid && smbForm.controls.label.dirty"
            [invalidText]="labelError"
            cdRequiredField="Label"
            i18n
          >
            <cds-dropdown-list></cds-dropdown-list>
          </cds-combo-box>
        </div>

        <!-- Hosts -->
        <div *ngIf="smbForm.controls.placement.value === 'hosts'"
             class="form-item">
          <cds-combo-box
            type="multi"
            selectionFeedback="top-after-reopen"
            label="Hosts"
            for="hosts"
            name="hosts"
            formControlName="hosts"
            id="hosts"
            placeholder="Select hosts..."
            i18n-placeholder
            [appendInline]="true"
            [items]="data.hosts"
            (selected)="multiSelector($event, 'hosts')"
            i18n
          >
            <cds-dropdown-list></cds-dropdown-list>
          </cds-combo-box>
        </div>
      </ng-container>
    </ng-container>

    <!-- Clustering -->
    <div class="form-item">
      <cds-select
        formControlName="clustering"
        name="clustering"
        for="clustering"
        label="Clustering"
        id="clustering"
        i18n
      >
        <option *ngFor="let data of allClustering">{{ data }}</option>
      </cds-select>
    </div>

    <!-- Custom DNS -->
    <ng-container formArrayName="custom_dns"
                  *ngFor="let dns of custom_dns.controls; index as i">
      <div cdsRow
           class="form-item form-item-append">
        <div cdsCol
             [columnNumbers]="{ lg: 8 }">
          <input cdsText
                 [formControlName]="i"
                 placeholder="Custom DNS"
                 modal-primary-focus />
        </div>
        <div cdsCol
             [columnNumbers]="{ lg: 1 }"
             class="item-action-btn">
          <cds-icon-button kind="tertiary"
                           size="sm"
                           (click)="removeCustomDNS(i)">
            <svg cdsIcon="trash-can"
                 size="32"
                 class="cds--btn__icon"></svg>
          </cds-icon-button>
        </div>
      </div>
    </ng-container>

    <div class="form-item">
      <button cdsButton="tertiary"
              type="button"
              (click)="addCustomDns()"
              i18n>
        Add Custom DNS
        <svg cdsIcon="add"
             size="32"
             class="cds--btn__icon"
             icon></svg>
      </button>
    </div>
    <cd-form-button-panel
      (submitActionEvent)="submitAction()"
      [form]="smbForm"
      [submitText]="(action | titlecase) + ' ' + (resource | upperFirst)"
      wrappingClass="text-right"
    ></cd-form-button-panel>
  </form>
</div>
