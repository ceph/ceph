<cd-tearsheet
 [steps]="steps"
 [title]="title"
 [description]="description"
 (submitRequested)="onSubmit()"
 >
  <cd-tearsheet-step>
    <form [formGroup]="subsystemForm"
          novalidate>
      <div cdsGrid
           [useCssGrid]="true"
           [narrow]="true"
           [fullWidth]="true">
        <div cdsCol
             [columnNumbers]="{sm: 4, md: 8}">
          <div cdsRow
               class="form-heading">
            <h3 class="cds--type-heading-03"
                i18n>Subsystem details</h3>
            <p
              class="cds--type-label-02"
              i18n>Enter identifying and network details for this subsystem.</p>
          </div>
          <div cdsRow
               class="form-item">
            <cds-text-label
              i18n
              [invalid]="nqnRef.isInvalid"
              [invalidText]="nqnInvalidTemplate"
              helperText="A unique identifier for the subsystem"
              i18n-helperText>
              Subsystem NQN (NVMe Qualified Name)
              <input cdsText
                     cdValidate
                     #nqnRef="cdValidate"
                     type="text"
                     formControlName="nqn"
                     [invalid]="nqnRef.isInvalid">
            </cds-text-label>
          </div>
          <div cdsRow
               class="form-item">
            <cds-text-label
              i18n
              [invalid]="maxNs.isInvalid"
              [invalidText]="maxNamespacesInvalidTemplate"
              helperText="The maximum namespaces per subsystem. Default is {{defaultMaxNamespace}}"
              i18n-helperText>
              Maximum Namespaces
              <input cdsText
                     cdValidate
                     #maxNs="cdValidate"
                     type="text"
                     formControlName="maxNamespaces"
                     [invalid]="maxNs.isInvalid">
            </cds-text-label>
          </div>
        </div>
      </div>
    </form>
  </cd-tearsheet-step>
</cd-tearsheet>


<ng-template #validationErrors
             let-control="control">
@if (control.errors) {
@for (err of control.errors | keyvalue; track err.key) {
<span class="invalid-feedback">{{ INVALID_TEXTS[err.key] }}</span>
}
}
</ng-template>

<ng-template #nqnInvalidTemplate>
  <ng-container *ngTemplateOutlet="validationErrors; context: { control: subsystemForm.get('nqn') }"></ng-container>
</ng-template>

<ng-template #maxNamespacesInvalidTemplate>
  <ng-container *ngTemplateOutlet="validationErrors; context: { control: subsystemForm.get('maxNamespaces') }"></ng-container>
</ng-template>
