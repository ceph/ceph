<cd-table #table
          [autoReload]="true"
          [data]="data$ | async"
          [columns]="columns"
          selectionType="single"
          columnMode="flex"
          (updateSelection)="updateSelection($event)"
          identifier="RoleName">
  <cd-table-actions class="table-actions"
                    [permission]="permission"
                    [selection]="selection"
                    [tableActions]="tableActions">
  </cd-table-actions>
</cd-table>
