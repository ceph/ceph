<div class="cd-form">
  <h2 class="cd-heading-04">Create User</h2>

  <form
    [formGroup]="form"
    (ngSubmit)="onSubmit()"
  >
    <!-- USER ENTITY -->
    <div class="cd-form-section">
      <label
        class="cd-label"
        for="username"
      >
        User entity *
      </label>

      <div class="user-entity-group">
        <span class="prefix">client.</span>

        <input
          id="username"
          cdsTextInput
          formControlName="username"
          placeholder="Enter username"
        />
      </div>
    </div>

    <!-- CAPABILITIES -->
    <div class="cd-form-section">
      <h3 class="cd-heading-03">Capabilities</h3>

      <div formArrayName="caps">
        <div
          *ngFor="let cap of caps.controls; let i = index"
          [formGroupName]="i"
          class="cap-row"
        >
          <select
            cdsSelect
            formControlName="entity"
          >
            <option value="" disabled>
              Select entity
            </option>
            <option value="mon">mon</option>
            <option value="osd">osd</option>
            <option value="mgr">mgr</option>
            <option value="mds">mds</option>
            <option value="rgw">rgw</option>
          </select>

          <select
            cdsSelect
            formControlName="permission"
          >
            <option value="" disabled>
              Select permission
            </option>
            <option value="allow r">allow r</option>
            <option value="allow rw">allow rw</option>
            <option value="allow rwx">allow rwx</option>
          </select>

          <!-- REMOVE -->
          <button
            cdsButton="ghost"
            size="sm"
            type="button"
            (click)="removeCap(i)"
          >
            ✕
          </button>
        </div>
      </div>

      <button
        cdsButton="secondary"
        size="sm"
        type="button"
        (click)="addCap()"
      >
        + Add Capability
      </button>
    </div>

    <!-- ACTIONS -->
    <div class="cd-actions">
      <button
        cdsButton="secondary"
        type="button"
      >
        Cancel
      </button>

      <button
        cdsButton="primary"
        type="submit"
        [disabled]="form.invalid"
      >
        Create User
      </button>
    </div>
  </form>
</div>
