<form
  [formGroup]="form"
  (ngSubmit)="onSubmit()"
  novalidate>

  <div
    cdsGrid
    [fullWidth]="true">

    <div
      cdsCol
      [columnNumbers]="{ sm: 4, md: 12 }">

      <!-- HEADING -->
      <div
        cdsRow
        class="form-heading">
        <div
          cdsCol
          [columnNumbers]="{ sm: 4, md: 12 }">
          <h3 i18n>Create User</h3>
          <cd-help-text [formAllFieldsRequired]="true"></cd-help-text>
        </div>
      </div>

      <!-- USER ENTITY -->
      <div
        cdsRow
        class="form-item">
        <div
          cdsCol
          [columnNumbers]="{ sm: 4, md: 7 }">

          <label
            class="cds--label"
            i18n>User entity *</label>

          <div
            class="cds--text-input__field-wrapper">
            <span class="cds--text-input__prefix">client.</span>

            <input
              cdsText
              id="username"
              formControlName="username"
              placeholder="Enter username"
              i18n-placeholder
            />
          </div>

        </div>
      </div>

      <!-- CAPABILITIES -->
      <div
        cdsRow
        class="form-heading">
        <div
          cdsCol
          [columnNumbers]="{ sm: 4, md: 12 }">
          <h4 i18n>Capabilities</h4>
        </div>
      </div>

      <div
        formArrayName="caps">

        <!-- LABEL ROW -->
        <div
          cdsRow
          class="cap-label-row">
          <div
            cdsCol
            [columnNumbers]="{ sm: 4, md: 3 }">
            <label
              class="cds--label"
              i18n>Entity *</label>
          </div>

          <div
            cdsCol
            [columnNumbers]="{ sm: 4, md: 3 }">
            <label
              class="cds--label"
              i18n>Entity Capabilities *</label>
          </div>

          <div
            cdsCol
            [columnNumbers]="{ sm: 4, md: 1 }">
          </div>
        </div>

        <!-- INPUT ROWS -->
      @for (cap of caps.controls; let i = $index; track i) {
        <div
          [formGroupName]="i"
          cdsRow
          class="cap-input-row"
        >

          <!-- ENTITY -->
          <div
            cdsCol
            [columnNumbers]="{ sm: 4, md: 3 }">
            <cds-select formControlName="entity">
              <option
                value=""
                disabled
                i18n>Select entity</option>
              <option value="mon" i18n>mon</option>
              <option value="osd" i18n>osd</option>
              <option value="mgr" i18n>mgr</option>
              <option value="mds" i18n>mds</option>
              <option value="rgw" i18n>rgw</option>
            </cds-select>
          </div>

          <!-- PERMISSION -->
          <div
            cdsCol
            [columnNumbers]="{ sm: 4, md: 3 }">
            <cds-select formControlName="permission">
              <option
                value=""
                disabled
                i18n>Select permission</option>
              <option value="allow r" i18n>allow r</option>
              <option value="allow rw" i18n>allow rw</option>
              <option value="allow rwx" i18n>allow rwx</option>
            </cds-select>
          </div>

          <!-- REMOVE -->
          <div
            cdsCol
            [columnNumbers]="{ sm: 4, md: 1 }"
            class="remove-col">
            <button
              cdsButton="ghost"
              size="sm"
              type="button"
              (click)="removeCap(i)"
              aria-label="Remove capability"
            >
              <cd-icon
               type="destroy"></cd-icon>
            </button>
          </div>

        </div>
      }

      </div>

      <!-- ADD BUTTON -->
      <div
        cdsRow
        class="form-item">
        <div
          cdsCol
          [columnNumbers]="{ sm: 4, md: 4 }"
          class="cds-pl-6">
          <button
            cdsButton="secondary"
            size="sm"
            type="button"
            (click)="addCap()"
          >
            <span i18n>Add Capability</span>
            <cd-icon
            type="add"
            size="16"></cd-icon>
          </button>
        </div>
      </div>

      <!-- ACTIONS -->
      <div
        cdsRow>
        <div
          cdsCol
          [columnNumbers]="{ sm: 4, md: 12 }">
          <cd-form-button-panel
            wrappingClass="form-button"></cd-form-button-panel>
        </div>
      </div>

    </div>

  </div>

</form>
