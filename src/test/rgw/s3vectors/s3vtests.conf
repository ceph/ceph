# s3vector_backend: Storage backend for s3vector data.
# Options: local, s3, or sal (default in RGW is sal)
#   local - LanceDB stores data on local filesystem
#   s3    - LanceDB stores data in an S3 bucket
#   sal   - LanceDB stores data via RGW's SAL layer
# When set to 's3' or 'sal', tests will create a regular S3 bucket with the
# same name as the vector bucket before vector operations.
# This value must match the rgw_s3vector_backend setting in ceph.conf.
s3vector_backend = sal

