roles:
- [mgr.x, mon.a, mon.c, mds.a, mds.c, osd.0, client.0]
- [mgr.y, mgr.z, mon.b, mds.b, osd.1, osd.2, osd.3, client.1]

overrides:
  ceph:
    conf:
      osd:
        osd mclock override recovery settings: true
      mgr:
        mon warn on pool no app: false

tasks:
  - install:
  - ceph:
      # tests may leave mgrs broken, so don't try and call into them
      # to invoke e.g. pg dump during teardown.
      wait-for-scrub: false
      log-ignorelist:
        - overall HEALTH_
        - \(MGR_DOWN\)
        - \(PG_
        - replacing it with standby
        - No standby daemons available
        - \(FS_DEGRADED\)
        - \(MDS_FAILED\)
        - \(MDS_DEGRADED\)
        - \(FS_WITH_FAILED_MDS\)
        - \(MDS_DAMAGE\)
        - \(MDS_ALL_DOWN\)
        - \(MDS_UP_LESS_THAN_MAX\)
        - \(OSD_DOWN\)
        - \(OSD_HOST_DOWN\)
        - \(POOL_APP_NOT_ENABLED\)
        - \(OSDMAP_FLAGS\)
        - \(OSD_FLAGS\)
        - \(TELEMETRY_CHANGED\)
        - pauserd,pausewr flag\(s\) set
        - Monitor daemon marked osd\.[[:digit:]]+ down, but it is still running
        - evicting unresponsive client .+
        - MON_DOWN
  - rgw: [client.0]
  - cephfs_test_runner:
      fail_on_skip: false
      modules:
        - tasks.mgr.test_dashboard
        - tasks.mgr.dashboard.test_rgw
