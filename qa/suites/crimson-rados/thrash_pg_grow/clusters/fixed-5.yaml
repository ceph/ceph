roles:
- [mon.a, osd.0, osd.1, client.0, node-exporter.a]
- [mon.b, osd.2, osd.3, client.1, prometheus.a, node-exporter.b]
- [mon.c, osd.4, osd.5]
- [mgr.x, osd.6, osd.7]
- [mgr.y, osd.8, osd.9]
overrides:
  ceph:
    conf:
      osd:
        osd shutdown pgref assert: true
        crimson bluestore cpu set: 6-7
      osd.0:
        crimson cpu set: 0-2
      osd.1:
        crimson cpu set: 3-5
      osd.2:
        crimson cpu set: 0-2
      osd.3:
        crimson cpu set: 3-5
      osd.4:
        crimson cpu set: 0-2
      osd.5:
        crimson cpu set: 3-5
      osd.6:
        crimson cpu set: 0-2
      osd.7:
        crimson cpu set: 3-5
      osd.8:
        crimson cpu set: 0-2
      osd.9:
        crimson cpu set: 3-5
      global:
        ms cluster mode: crc
        ms service mode: crc
        ms client mode: crc
        ms mon service mode: crc
        ms mon cluster mode: crc
        ms mon client mode: crc
