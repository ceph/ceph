upgrade-tasks:
  sequential:
    - cephadm.shell:
        env: [sha1]
        mon.a:
          - ceph config set mon mon_warn_on_insecure_global_id_reclaim false --force
          - ceph config set mon mon_warn_on_insecure_global_id_reclaim_allowed false --force
          - ceph config set global log_to_journald false --force
          - print: "**** ceph versions before cephfs-mirror upgrade ****"
          - ceph versions
          - ceph orch upgrade start --image quay.ceph.io/ceph-ci/ceph:$sha1 --daemon-types cephfs-mirror
          - while ceph orch upgrade status | jq '.in_progress' | grep true && ! ceph orch upgrade status | jq '.message' | grep Error ; do ceph orch ps ; ceph versions ; ceph orch upgrade status ; sleep 30 ; done
          - ceph versions | jq -e '."cephfs-mirror" | length == 1'
          - ceph versions | jq -e '."cephfs-mirror" | keys' | grep $sha1
          - ceph versions | jq -e '.overall | length == 2'
          - print: "**** ceph versions after cephfs-mirror upgrade ****"
          - ceph versions
          - ceph orch upgrade check quay.ceph.io/ceph-ci/ceph:$sha1 | jq -e '.up_to_date | length == 2'
          - ceph orch ps
