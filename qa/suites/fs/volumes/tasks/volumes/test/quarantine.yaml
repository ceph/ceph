# Quarantine tests for mgr/volumes module integration.
# Tests MDS auth caps (TestQuarantineAuthCaps) are in fs/functional since
# they test core CephFS behavior, not volumes module specifically.
overrides:
  ceph:
    log-ignorelist:
      - slow request
      - quarantine
tasks:
  - cephfs_test_runner:
      fail_on_skip: false
      modules:
        - tasks.cephfs.test_quarantine.TestQuarantineBasic
        - tasks.cephfs.test_quarantine.TestQuarantineSnapshot
        - tasks.cephfs.test_quarantine.TestQuarantineSubvolumeOps
        - tasks.cephfs.test_quarantine.TestQuarantineMultipleSubvolumes
