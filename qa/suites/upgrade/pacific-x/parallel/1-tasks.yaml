teuthology:
  postmerge:
    - |
      -- centos 9 is not available for Pacific ; centos 8 is not available for reef on new lab
      if (yaml.os_type == "centos") or (yaml.os_type == "ubuntu" and yaml.os_version == "22.04") then
        reject()
      end

overrides:
  ceph:
    log-ignorelist:
      - mons down
      - mon down
      - MON_DOWN
      - out of quorum
tasks:
- install:
    branch: pacific
    exclude_packages:
      - ceph-volume
- print: "**** done install task..."
- print: "**** done start installing pacific cephadm ..."
- cephadm:
    image: quay.io/ceph/ceph:v16.2.15
    allow_mismatched_release: true
    conf:
      osd:
        #set config option for which cls modules are allowed to be loaded / used
        osd_class_load_list: "*"
        osd_class_default_list: "*"
- print: "**** done end installing pacific cephadm ..."

- print: "**** done start cephadm.shell ceph config set mgr..."
- cephadm.shell:
    mon.a:
      - ceph config set mgr mgr/cephadm/use_repo_digest true --force
- print: "**** done cephadm.shell ceph config set mgr..."

- print: "**** done start telemetry pacific..."
- workunit:
    clients:
      client.0:
        - test_telemetry_pacific.sh
- print: "**** done end telemetry pacific..."

# This is fun: A bug was introduced that started with
# 6c097015bbc1bcfa8abe518680a3d3a17ff39884. The MON_SINGLE_PAXOS was
# deprecated but kept in CEPH_FEATURES_ALL and not removed until
# f1ecf99a86edfe899392b6b734351f1015a93be6 which didn't get released
# until Quincy. So Pacific OSDs are still advertising MON_SINGLE_PAXOS
# which is interpreted as SERVER_REEF by reef monitors. So why didn't we
# catch that during upgrades to reef from pacific for v18.2.0 QA testing?
# WELL, have I got a surprise for you. We didn't check that all OSDs are
# running reef until 25e8b22c6f29cd3947b501f6aaf7614ba204a2c8 which was
# released in v18.2.5.
- ceph health mute OSD_UPGRADE_FINISHED --sticky

- print: "**** done start parallel"
- parallel:
    - workload
    - upgrade-sequence
- print: "**** done end parallel"

- print: "**** done start telemetry x..."
- workunit:
    clients:
      client.0:
        - test_telemetry_pacific_x.sh
- print: "**** done end telemetry x..."
