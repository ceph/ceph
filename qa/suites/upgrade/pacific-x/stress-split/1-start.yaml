teuthology:
  postmerge:
    - |
      -- centos 9 is not available for Pacific ; centos 8 is not available for reef on new lab
      if (yaml.os_type == "centos") or (yaml.os_type == "ubuntu" and yaml.os_version == "22.04") then
        reject()
      end

tasks:
- install:
    branch: pacific
    exclude_packages:
      - ceph-volume

- cephadm:
    image: quay.io/ceph/ceph:v16.2.15
    allow_mismatched_release: true
    conf:
      osd:
        #set config option for which cls modules are allowed to be loaded / used
        osd_class_load_list: "*"
        osd_class_default_list: "*"

- cephadm.shell:
    mon.a:
      - ceph fs volume create foo
      - ceph config set mon mon_warn_on_insecure_global_id_reclaim false --force
      - ceph config set mon mon_warn_on_insecure_global_id_reclaim_allowed false --force

- ceph.healthy:

- print: "**** upgrading first half of cluster, with stress ****"
- parallel:
    - first-half-tasks
    - first-half-sequence
- print: "**** done upgrading first half of cluster ****"

- ceph.healthy:

- print: "**** applying stress + thrashing to mixed-version cluster ****"

- parallel:
    - stress-tasks

- ceph.healthy:

- print: "**** finishing upgrade ****"
- parallel:
    - second-half-tasks
    - second-half-sequence

- ceph.healthy:


#################

first-half-sequence:
- cephadm.shell:
    env: [sha1]
    mon.a:
      - ceph config set mgr mgr/cephadm/daemon_cache_timeout 60
      - ceph config set global log_to_journald false --force

      # This is fun: A bug was introduced that started with
      # 6c097015bbc1bcfa8abe518680a3d3a17ff39884. The MON_SINGLE_PAXOS was
      # deprecated but kept in CEPH_FEATURES_ALL and not removed until
      # f1ecf99a86edfe899392b6b734351f1015a93be6 which didn't get released
      # until Quincy. So Pacific OSDs are still advertising MON_SINGLE_PAXOS
      # which is interpreted as SERVER_REEF by reef monitors. So why didn't we
      # catch that during upgrades to reef from pacific for v18.2.0 QA testing?
      # WELL, have I got a surprise for you. We didn't check that all OSDs are
      # running reef until 25e8b22c6f29cd3947b501f6aaf7614ba204a2c8 which was
      # released in v18.2.5.

      - ceph health mute OSD_UPGRADE_FINISHED --sticky

      - echo wait for mgr daemons to upgrade
      # upgrade the mgr daemons first
      - ceph orch upgrade start --image quay.ceph.io/ceph-ci/ceph:$sha1 --daemon-types mgr
      - while ceph orch upgrade status | jq '.in_progress' | grep true && ! ceph orch upgrade status | jq '.message' | grep Error ; do ceph orch ps ; ceph versions ; ceph orch upgrade status ; sleep 30 ; done

      - echo wait for minority of mons to upgrade
      # upgrade 1 of 3 mon daemons, then wait 60 seconds
      - ceph orch upgrade start --image quay.ceph.io/ceph-ci/ceph:$sha1 --daemon-types mon --limit 1
      - while ceph orch upgrade status | jq '.in_progress' | grep true && ! ceph orch upgrade status | jq '.message' | grep Error ; do ceph orch ps ; ceph versions ; ceph orch upgrade status ; sleep 30 ; done
      - sleep 60

      - echo wait for majority of mons to upgrade
      # upgrade one more mon daemon (to get us to 2/3 upgraded) and wait 60 seconds
      - ceph orch upgrade start --image quay.ceph.io/ceph-ci/ceph:$sha1 --daemon-types mon --limit 1
      - while ceph orch upgrade status | jq '.in_progress' | grep true && ! ceph orch upgrade status | jq '.message' | grep Error ; do ceph orch ps ; ceph versions ; ceph orch upgrade status ; sleep 30 ; done
      - sleep 60

      - echo wait for all mons to upgrade
      # upgrade final mon daemon and wait 60 seconds
      - ceph orch upgrade start --image quay.ceph.io/ceph-ci/ceph:$sha1 --daemon-types mon
      - while ceph orch upgrade status | jq '.in_progress' | grep true && ! ceph orch upgrade status | jq '.message' | grep Error ; do ceph orch ps ; ceph versions ; ceph orch upgrade status ; sleep 30 ; done
      - sleep 60

      - echo wait for half of osds to upgrade
      # upgrade 4 of the 8 OSDs
      - ceph orch upgrade start --image quay.ceph.io/ceph-ci/ceph:$sha1 --daemon-types osd --limit 4
      - while ceph orch upgrade status | jq '.in_progress' | grep true && ! ceph orch upgrade status | jq '.message' | grep Error ; do ceph orch ps ; ceph versions ; ceph orch upgrade status ; sleep 30 ; done


#################

stress-tasks:
- thrashosds:
    timeout: 1200
    chance_pgnum_grow: 1
    chance_pgpnum_fix: 1
    chance_thrash_cluster_full: 0
    chance_thrash_pg_upmap: 0
    chance_thrash_pg_upmap_items: 0
    disable_objectstore_tool_tests: true
    chance_force_recovery: 0
    aggressive_pg_num_changes: false


#################

second-half-sequence:
  sequential:
    - cephadm.shell:
        env: [sha1]
        mon.a:
          - sleep 60

          - echo wait for upgrade to complete
          # upgrade whatever is left
          - ceph orch upgrade start --image quay.ceph.io/ceph-ci/ceph:$sha1
          - while ceph orch upgrade status | jq '.in_progress' | grep true && ! ceph orch upgrade status | jq '.message' | grep Error ; do ceph orch ps ; ceph versions ; ceph orch upgrade status ; sleep 30 ; done

          - echo upgrade complete
          - ceph orch ps
          - ceph versions
          - ceph versions | jq -e '.overall | length == 1'
          - ceph versions | jq -e '.overall | keys' | grep $sha1
