meta:
- desc: |
   librbd C and C++ api tests
overrides:
  ceph:
    log-ignorelist:
      # TestLibRBD.RemoveFullTryDataPool
      - POOL_FULL
      - is full
      - pool.*full
workload:
  full_sequential:
    - print: "**** done start test_rbd_api.yaml"
    - workunit:
        branch: tentacle
        clients:
          client.0:
              - rbd/test_librbd.sh
        env:
          RBD_FEATURES: "61"
    - print: "**** done end test_rbd_api.yaml"
