overrides:
  ceph:
    log-ignorelist:
      - do not have an application enabled
      - application not enabled
      - or freeform for custom applications
      - POOL_APP_NOT_ENABLED
      - is down
      - OSD_DOWN
      - mons down
      - mon down
      - MON_DOWN
      - out of quorum
      - PG_AVAILABILITY
      - PG_DEGRADED
      - Reduced data availability
      - Degraded data redundancy
      - pg .* is stuck inactive
      - pg .* is stuck peering
      - pg .* is .*degraded
      - FS_DEGRADED
      - OSDMAP_FLAGS
      - OSD_UPGRADE_FINISHED
      - Replacing daemon mds
      - MDS_ALL_DOWN
      - MDS_UP_LESS_THAN_MAX
      - filesystem is offline
      - with fewer MDS than max_mds
      - CEPHADM_FAILED_DAEMON
      - pg .* is stuck undersized
      - HEALTH_WARN .* osds down
      - MDS_INSUFFICIENT_STANDBY
      - POOL_FULL
tasks:
- install:
    branch: reef
    exclude_packages:
      - ceph-volume

- cephadm:
    image: quay.io/ceph/ceph:v18.2.8
    compiled_cephadm_branch: reef
    conf:
      osd:
        #set config option for which cls modules are allowed to be loaded / used
        osd_class_load_list: "*"
        osd_class_default_list: "*"

- cephadm.shell:
    mon.a:
      - ceph fs volume create foo
      - ceph config set mon mon_warn_on_insecure_global_id_reclaim false --force
      - ceph config set mon mon_warn_on_insecure_global_id_reclaim_allowed false --force

- ceph.healthy:

- print: "**** upgrading first half of cluster, with stress ****"
- parallel:
    - first-half-tasks
    - first-half-sequence
- print: "**** done upgrading first half of cluster ****"

- ceph.healthy:

- print: "**** applying stress + thrashing to mixed-version cluster ****"

- parallel:
    - stress-tasks

- ceph.healthy:

- print: "**** finishing upgrade ****"
- parallel:
    - second-half-tasks
    - second-half-sequence

- ceph.healthy:


#################

stress-tasks:
- thrashosds:
    timeout: 1200
    chance_pgnum_grow: 1
    chance_pgpnum_fix: 1
    chance_thrash_cluster_full: 0
    chance_thrash_pg_upmap: 0
    chance_thrash_pg_upmap_items: 0
    disable_objectstore_tool_tests: true
    chance_force_recovery: 0
    aggressive_pg_num_changes: false
