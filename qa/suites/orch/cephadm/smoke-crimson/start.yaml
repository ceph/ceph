verify_ceph_hash: false
overrides:
  ceph:
    log-only-match:
      - CEPHADM_
    log-ignorelist:
      - CEPHADM_AGENT_DOWN
      - CEPHADM_FAILED_DAEMON
      - CEPHADM_STRAY_DAEMON
tasks:
- cephadm:
    osd_type: crimson
    conf:
      mgr:
        debug ms: 1
        debug mgr: 20
        debug osd: 10
- cephadm.shell:
    mon.a:
      - ceph orch status
      - ceph orch ps
      - ceph orch ls
      - ceph orch host ls
      - ceph orch device ls
      - ceph orch ls --format yaml
      - ceph orch ls | grep 'osd'
