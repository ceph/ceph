roles:
- [mon.a, mgr.x, osd.0, osd.1, client.0, node-exporter.a]
- [osd.2, osd.3, client.1, prometheus.a, node-exporter.b]
openstack:
- volumes:
    count: 2
    size: 10 # GB
overrides:
  ceph:
    conf:
      osd:
        osd shutdown pgref assert: true
        crimson cpu num: 4
      global:
        ms cluster mode: crc
        ms service mode: crc
        ms client mode: crc
        ms mon service mode: crc
        ms mon cluster mode: crc
        ms mon client mode: crc
