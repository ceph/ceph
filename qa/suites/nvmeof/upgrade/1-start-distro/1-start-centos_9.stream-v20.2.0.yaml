os_type: centos
os_version: "9.stream"

tasks:
- install:
    tag: v20.2.0
    exclude_packages:
      - ceph-volume
      - ceph-osd-classic
      - ceph-osd-crimson
    extra_packages:
      - nvme-cli
- print: "**** done install task..."

- cephadm:
    image: quay.io/ceph/ceph:v20.2.0

- nvmeof:
    installer: host.a
    rbd:
      pool_name: mypool
      image_name_prefix: myimage
    gateway_config:
      subsystems_count: 3
      namespaces_count: 20

- cephadm.wait_for_service:
    service: nvmeof.mypool.mygroup0
