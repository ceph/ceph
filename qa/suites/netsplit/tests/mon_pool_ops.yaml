overrides:
  ceph:
    conf:
      global:
        mon election default strategy: 3
tasks:
- workunit:
    clients:
      client.0:
        - mon/setup_stretch_cluster.sh
- workunit:
    clients:
      client.0:
        - mon/stretch_workload.sh
- netsplit.disconnect: [mon.a, mon.c]
- workunit:
    clients:
      client.0:
        - mon/stretch_workload.sh
- netsplit.reconnect: [mon.a, mon.c]
- netsplit.disconnect: [mon.b, mon.c]
- workunit:
    clients:
      client.0:
        - mon/stretch_workload.sh
- netsplit.reconnect: [mon.a, mon.c]
- netsplit.disconnect: [mon.a, mon.b]
- workunit:
    clients:
      client.0:
        - mon/stretch_workload.sh